name: Notify tap on release

on:
  release:
    types: [published]

jobs:
  notify-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_PAT }}
          repository: mitradranirban/homebrew-tap
          event-type: colr-pak-release
          client-payload: >-
            {
              "version": "${{ github.ref_name }}",
              "zip_url": "https://github.com/mitradranirban/colr-pak/releases/download/${{ github.ref_name }}/colrpak-macos.zip"
            }

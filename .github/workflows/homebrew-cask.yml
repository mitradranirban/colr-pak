on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. vx.x.x)'
        required: true

jobs:
  notify-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger tap update
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_PAT }}
          repository: mitradranirban/homebrew-tap
          event-type: colr-pak-release
          client-payload: >-
            {
              "version": "${{ github.event.inputs.version || github.ref_name }}",
              "zip_url": "https://github.com/mitradranirban/colr-pak/releases/download/${{ github.event.inputs.version || github.ref_name }}/colrpak-macos.zip"
            }

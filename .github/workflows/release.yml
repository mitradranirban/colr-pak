name: Release ColrPak

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── All platforms build in parallel ──────────────────────────────────────
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt | tee pip_log.txt
          pip install -r requirements-dev.txt
          pip install --no-binary=:all: --force-reinstall unicodedata2

      - name: Make and install universal wheels
        if: matrix.os == 'macos-latest'
        run: |
          python macos/ensure_universal_wheels.py pip_log.txt
          pip install --force build/universal_wheels/*.whl

      - name: Build with PyInstaller
        run: pyinstaller ColrPak.spec -y

      # ── Linux packaging ───────────────────────────────────────────────────
      - name: Package Linux (x86_64)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x dist/colrpak
          tar -czf colrpak-linux.tar.gz -C dist colrpak

      - name: Package Linux (ARM64)
        if: matrix.os == 'ubuntu-24.04-arm'
        run: |
          chmod +x dist/colrpak
          tar -czf colrpak-linux-arm64.tar.gz -C dist colrpak

      # ── macOS packaging ───────────────────────────────────────────────────
      - name: Package and sign macOS app
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - "dist/Colr Pak.app"
          codesign --verify --deep --strict "dist/Colr Pak.app"
          ditto -c -k --sequesterRsrc --keepParent "dist/Colr Pak.app" colrpak-macos.zip

      # ── Windows: upload raw exe for installer job ─────────────────────────
      - name: Stage Windows exe
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "dist\Colr Pak.exe" "staging\Colr Pak.exe"

      # ── Upload artifacts ──────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        if: matrix.os != 'windows-latest'
        with:
          name: colrpak-${{ matrix.os }}
          path: colrpak*

      - uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest'
        with:
          name: colrpak-windows-exe
          path: staging/Colr Pak.exe

  # ── Windows installers (NSIS + WiX), runs after windows build ────────────
  windows-installer:
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        shell: pwsh
        run: |
          $versionFull    = "${{ github.ref_name }}" -replace '^v', ''
          $versionNumeric = $versionFull -replace '[-+].*$', ''
          echo "VERSION=$versionFull"           >> $env:GITHUB_ENV
          echo "VERSION_NUMERIC=$versionNumeric" >> $env:GITHUB_ENV

      - name: Download Windows exe
        uses: actions/download-artifact@v4
        with:
          name: colrpak-windows-exe
          path: dist

      - name: Verify exe
        shell: pwsh
        run: Get-Item "dist\Colr Pak.exe"

      # ── NSIS ──────────────────────────────────────────────────────────────
      - name: Install NSIS
        uses: repolevedavaj/install-nsis@v1.0.3
        with:
          nsis-version: "3.10"

      - name: Compile NSIS installer
        uses: joncloud/makensis-action@v4.1
        with:
          script-file: packaging/windows/colr-pak-installer.nsi
          arguments: >
            /V3
            /DVERSION=${{ env.VERSION }}

      # ── WiX MSI ───────────────────────────────────────────────────────────
      - name: Install WiX v4
        shell: pwsh
        run: dotnet tool install --global wix

      - name: Add WiX UI extension
        shell: pwsh
        run: wix extension add WixToolset.UI.wixext

      - name: Compile WiX MSI
        shell: pwsh
        run: wix build packaging\windows\Product.wxs -d "Version=${{ env.VERSION_NUMERIC }}" -ext WixToolset.UI.wixext -o "$env:GITHUB_WORKSPACE\dist\ColrPak-${{ env.VERSION }}.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: colrpak-windows-latest
          path: |
            dist/ColrPak-Setup-${{ env.VERSION }}.exe
            dist/ColrPak-${{ env.VERSION }}.msi

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    needs: [build, windows-installer]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: colrpak-*
          merge-multiple: false

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_PAT }}
        with:
          files: |
            dist/colrpak-ubuntu-latest/colrpak-linux.tar.gz
            dist/colrpak-ubuntu-24.04-arm/colrpak-linux-arm64.tar.gz
            dist/colrpak-macos-latest/colrpak-macos.zip
            dist/colrpak-windows-latest/ColrPak-Setup-*.exe
            dist/colrpak-windows-latest/ColrPak-*.msi
          generate_release_notes: true

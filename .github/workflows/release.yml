name: Release ColrPak

on:
  push:
    tags:
      - 'v*'
    workflow dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller FontraPak.spec -y

    - name: Package Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        chmod +x dist/colorpak
        tar -czf colrpak-linux.tar.gz -C dist colorpak

    - name: Package macOS (unsigned)
      if: matrix.os == 'macos-latest'
      run: |
        ditto -c -k --sequesterRsrc --keepParent "dist/Color Pak.app" colrpak-macos.zip

    - name: Package Windows
      if: matrix.os == 'windows-latest'
      shell: powershell
      run: |
        Compress-Archive -Path "dist/Color Pak.exe" -DestinationPath colrpak-windows.zip

    - uses: actions/upload-artifact@v4
      with:
        name: colrpak-${{ matrix.os }}
        path: |
          colrpak*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: dist/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/colrpak-ubuntu-latest/colrpak-linux.tar.gz
          dist/colrpak-macos-latest/colrpak-macos.zip
          dist/colrpak-windows-latest/colr-pak-windows.zip
        generate_release_notes: true
